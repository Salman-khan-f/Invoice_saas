spring.application.name=invoice-backend

# MongoDB Atlas Configuration
spring.data.mongodb.uri= mongodb+srv://salman:pass123@cluster0.abcde.mongodb.net/invoicesaas?retryWrites=true&w=majority
spring.data.mongodb.database= invoicesaas

# JWT Configuration
app.jwt.secret=YourSuperSecretJWTKeyThatIsAtLeast256BitsLongForHS256Algorithm
app.jwt.expiration=86400000

# Mail Configuration (configure with your SMTP provider)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# App Config
app.frontend.url=http://localhost:5173

# Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.invoicesaas=DEBUG

server.port=8080
